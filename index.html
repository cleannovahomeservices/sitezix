<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sitezix — Build something.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'] },
          colors: {
            sidebar: '#0f0f0f',
            'bg-deep': '#000000',
            'purple-deep': '#1a0533',
            'blue-deep': '#0a1628',
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── Animated mesh gradient ── */
    .mesh-bg {
      position: absolute;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    .mesh-bg::before,
    .mesh-bg::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.45;
    }

    .mesh-bg::before {
      width: 700px;
      height: 700px;
      top: -200px;
      left: 10%;
      background: radial-gradient(circle, #1a0533 0%, transparent 70%);
      animation: drift1 18s ease-in-out infinite alternate;
    }

    .mesh-bg::after {
      width: 600px;
      height: 600px;
      bottom: -150px;
      right: 5%;
      background: radial-gradient(circle, #0a1628 0%, transparent 70%);
      animation: drift2 22s ease-in-out infinite alternate;
    }

    .mesh-orb3 {
      position: absolute;
      width: 500px;
      height: 500px;
      top: 40%;
      left: 45%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, #0d0b20 0%, transparent 70%);
      filter: blur(100px);
      opacity: 0.5;
      animation: drift3 26s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, 80px) scale(1.08); }
    }
    @keyframes drift2 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-50px, -60px) scale(1.1); }
    }
    @keyframes drift3 {
      0%   { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-50%, -50%) scale(1.15); }
    }

    @media (prefers-reduced-motion: reduce) {
      .mesh-bg::before, .mesh-bg::after, .mesh-orb3 {
        animation: none;
      }
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #0f0f0f;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
    }

    .sidebar-logo {
      padding: 22px 20px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, #6d28d9, #3b82f6);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
    }

    /* Nav */
    .sidebar-nav {
      flex: 1;
      padding: 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.25);
      padding: 10px 10px 4px;
      text-transform: uppercase;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease;
      color: rgba(255,255,255,0.5);
      font-size: 13.5px;
      font-weight: 400;
      text-decoration: none;
      user-select: none;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.88);
    }

    .nav-item.active {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .nav-item svg {
      flex-shrink: 0;
      opacity: 0.7;
    }

    .nav-item.active svg { opacity: 1; }

    /* Sidebar divider */
    .sidebar-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 6px 10px;
    }

    /* Bottom section */
    .sidebar-bottom {
      padding: 12px 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-referral {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      transition: background 150ms, color 150ms, border-color 150ms;
      text-align: left;
    }

    .btn-referral:hover {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.14);
    }

    .btn-upgrade {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      background: linear-gradient(135deg, #4f1d96 0%, #1d3a6e 100%);
      border: 1px solid rgba(255,255,255,0.1);
      transition: opacity 150ms, transform 100ms;
      text-align: center;
    }

    .btn-upgrade:hover { opacity: 0.88; }
    .btn-upgrade:active { transform: scale(0.99); }

    /* ── Main area ── */
    .main {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px 0;
      overflow-y: auto;
    }

    /* ── Center content ── */
    .center-content {
      position: relative;
      z-index: 5;
      width: 100%;
      max-width: 660px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .headline {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #fff;
      text-align: center;
      line-height: 1.15;
    }

    /* ── Input card ── */
    .input-card {
      width: 100%;
      background: rgba(255,255,255,0.97);
      border-radius: 18px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.08),
        0 8px 40px rgba(0,0,0,0.35),
        0 2px 8px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .input-textarea {
      width: 100%;
      padding: 18px 20px 10px;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      color: #111;
      resize: none;
      min-height: 76px;
      line-height: 1.55;
    }

    .input-textarea::placeholder {
      color: rgba(0,0,0,0.3);
    }

    .input-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px 14px;
    }

    .toolbar-plus {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: 1.5px solid rgba(0,0,0,0.12);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 150ms, border-color 150ms;
      flex-shrink: 0;
      color: rgba(0,0,0,0.45);
    }

    .toolbar-plus:hover {
      background: rgba(0,0,0,0.05);
      border-color: rgba(0,0,0,0.2);
      color: rgba(0,0,0,0.7);
    }

    .toolbar-divider {
      width: 1px;
      height: 18px;
      background: rgba(0,0,0,0.1);
      flex-shrink: 0;
    }

    .pills-row {
      display: flex;
      align-items: center;
      gap: 5px;
      flex: 1;
      flex-wrap: nowrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      border-radius: 20px;
      border: 1.5px solid rgba(0,0,0,0.1);
      background: rgba(0,0,0,0.03);
      font-size: 12px;
      font-weight: 500;
      color: rgba(0,0,0,0.55);
      cursor: pointer;
      transition: background 150ms, border-color 150ms, color 150ms;
      user-select: none;
      white-space: nowrap;
    }

    .pill:hover {
      background: rgba(0,0,0,0.07);
      border-color: rgba(0,0,0,0.2);
      color: rgba(0,0,0,0.8);
    }

    .pill.active {
      background: #111;
      border-color: #111;
      color: #fff;
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.6;
    }

    .send-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #111;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 150ms, transform 100ms;
      flex-shrink: 0;
      margin-left: auto;
    }

    .send-btn:hover { background: #333; }
    .send-btn:active { transform: scale(0.95); }

    /* ── Templates section ── */
    .templates-section {
      position: relative;
      z-index: 5;
      width: 100%;
      max-width: 800px;
      margin-top: 8px;
      padding-bottom: 40px;
    }

    .templates-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 0 2px;
    }

    .templates-label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .templates-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .templates-scroll::-webkit-scrollbar { display: none; }

    .template-card {
      flex-shrink: 0;
      width: 160px;
      padding: 14px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      cursor: pointer;
      transition: background 200ms, border-color 200ms, transform 150ms;
      user-select: none;
    }

    .template-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.14);
      transform: translateY(-1px);
    }

    .template-card:active { transform: translateY(0); }

    .template-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .template-title {
      font-size: 12.5px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      margin-bottom: 3px;
      line-height: 1.3;
    }

    .template-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════
       SIDEBAR
  ════════════════════════════════════ -->
  <aside class="sidebar" role="navigation" aria-label="Main navigation">

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
            <path d="M7.5 1L13.5 4.5V10.5L7.5 14L1.5 10.5V4.5L7.5 1Z" fill="white" opacity="0.9"/>
          </svg>
        </div>
        <span class="logo-text">Sitezix</span>
      </div>
    </div>

    <!-- Nav items -->
    <nav class="sidebar-nav">

      <a class="nav-item active" href="#" aria-current="page">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>

      <a class="nav-item" href="#" aria-label="My Projects">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        My Projects
      </a>

      <a class="nav-item" href="#" aria-label="Templates">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="7" rx="1"/><rect x="3" y="14" width="8" height="7" rx="1"/><rect x="15" y="14" width="6" height="7" rx="1"/></svg>
        Templates
      </a>

      <div class="sidebar-divider" role="separator"></div>

      <a class="nav-item" href="#" aria-label="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>

    </nav>

    <!-- Bottom actions -->
    <div class="sidebar-bottom">
      <button class="btn-referral" aria-label="Refer a friend">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Refer a friend
      </button>
      <button class="btn-upgrade" aria-label="Upgrade to Pro">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Upgrade to Pro
      </button>
    </div>

  </aside>


  <!-- ═══════════════════════════════════
       MAIN AREA
  ════════════════════════════════════ -->
  <main class="main" role="main">

    <!-- Mesh gradient background -->
    <div class="mesh-bg" aria-hidden="true">
      <div class="mesh-orb3"></div>
    </div>

    <!-- Center content -->
    <div class="center-content">

      <h1 class="headline">Let's build something.</h1>

      <!-- Input card -->
      <div class="input-card" role="search" aria-label="Website builder">
        <textarea
          class="input-textarea"
          placeholder="Describe the website you want to build..."
          rows="2"
          aria-label="Describe the website you want to build"
        ></textarea>

        <div class="input-toolbar">

          <!-- Plus button -->
          <button class="toolbar-plus" aria-label="Add attachment or file" title="Add">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>

          <div class="toolbar-divider" role="separator"></div>

          <!-- Toggle pills -->
          <div class="pills-row" role="group" aria-label="Feature toggles">

            <button class="pill" aria-pressed="false" onclick="this.classList.toggle('active'); this.setAttribute('aria-pressed', this.classList.contains('active'))">
              <span class="pill-dot" aria-hidden="true"></span>
              Login
            </button>

            <button class="pill" aria-pressed="false" onclick="this.classList.toggle('active'); this.setAttribute('aria-pressed', this.classList.contains('active'))">
              <span class="pill-dot" aria-hidden="true"></span>
              Payments
            </button>

            <button class="pill" aria-pressed="false" onclick="this.classList.toggle('active'); this.setAttribute('aria-pressed', this.classList.contains('active'))">
              <span class="pill-dot" aria-hidden="true"></span>
              Deploy
            </button>

          </div>

          <!-- Send button -->
          <button class="send-btn" aria-label="Build website" title="Build">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>

        </div>
      </div>

    </div>

    <!-- ── Templates section ── -->
    <div class="templates-section">
      <div class="templates-header">
        <span class="templates-label">Templates</span>
      </div>

      <div class="templates-scroll" role="list" aria-label="Template gallery">

        <div class="template-card" role="listitem" tabindex="0" aria-label="SaaS Landing Page template">
          <div class="template-icon" style="background: rgba(109,40,217,0.18);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          </div>
          <div class="template-title">SaaS Landing</div>
          <div class="template-desc">Hero, pricing &amp; CTA</div>
        </div>

        <div class="template-card" role="listitem" tabindex="0" aria-label="Portfolio template">
          <div class="template-icon" style="background: rgba(59,130,246,0.18);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </div>
          <div class="template-title">Portfolio</div>
          <div class="template-desc">Personal showcase</div>
        </div>

        <div class="template-card" role="listitem" tabindex="0" aria-label="E-commerce Store template">
          <div class="template-icon" style="background: rgba(16,185,129,0.16);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          </div>
          <div class="template-title">E-commerce</div>
          <div class="template-desc">Shop &amp; checkout</div>
        </div>

        <div class="template-card" role="listitem" tabindex="0" aria-label="Blog template">
          <div class="template-icon" style="background: rgba(245,158,11,0.15);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </div>
          <div class="template-title">Blog</div>
          <div class="template-desc">Articles &amp; content</div>
        </div>

        <div class="template-card" role="listitem" tabindex="0" aria-label="Admin Dashboard template">
          <div class="template-icon" style="background: rgba(236,72,153,0.15);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f472b6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </div>
          <div class="template-title">Dashboard</div>
          <div class="template-desc">Admin &amp; analytics</div>
        </div>

        <div class="template-card" role="listitem" tabindex="0" aria-label="Agency Website template">
          <div class="template-icon" style="background: rgba(99,102,241,0.18);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          </div>
          <div class="template-title">Agency</div>
          <div class="template-desc">Services &amp; team</div>
        </div>

        <div class="template-card" role="listitem" tabindex="0" aria-label="Startup template">
          <div class="template-icon" style="background: rgba(239,68,68,0.14);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </div>
          <div class="template-title">Startup</div>
          <div class="template-desc">Launch &amp; waitlist</div>
        </div>

      </div>
    </div>

  </main>

  <script>
    // Auto-resize textarea
    const textarea = document.querySelector('.input-textarea');
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 180) + 'px';
    });

    // Send on Cmd/Ctrl + Enter
    textarea.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        document.querySelector('.send-btn').click();
      }
    });

    // Template card keyboard activation
    document.querySelectorAll('.template-card').forEach(card => {
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.click();
        }
      });
    });
  </script>

</body>
</html>
